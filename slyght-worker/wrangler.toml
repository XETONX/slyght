name = "slyght-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"

[[kv_namespaces]]
binding = "SLYGHT_DATA"
id = "a4ca2cafcf4743769d08ea5c0999f046"
# preview_id = "PLACEHOLDER_KV_PREVIEW_ID"  # optional: for wrangler dev

[triggers]
crons = [
  "0 22 * * *",
  "59 22 * * *",
  "30 1 * * *",
  "0 3 * * *",
  "30 7 * * *"
]

# NOTE: During AEDT (daylight saving, ~Oct–Apr), Sydney is UTC+11.
# Crons above target AEST (UTC+10). To handle AEDT, duplicate each
# cron shifted one hour (e.g. "0 22 * * *" for 9am AEDT) and let the
# worker's handleSchedule() deduplicate using Sydney local time check.

[vars]
WORKER_ENV = "production"

# Secrets — set via: npx wrangler secret put <NAME>
# VAPID_PRIVATE_KEY  — 32-byte raw EC private key, URL-safe base64 (43 chars)
# VAPID_PUBLIC_KEY   — 65-byte uncompressed EC point, URL-safe base64 (87 chars)
