<!DOCTYPE html>
<!-- slyght — Mission Control cockpit. Served by mission-control/server.js (which
     injects the write-token below). Reads the REAL repo files; writes via the
     server's allowlisted, path-jailed actions. Elevated from Opus's prototype:
     same dark-mono Space Mono terminal soul, built out into a working surface. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>slyght · mission control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c10; --panel:#0d1117; --panel2:#11161e; --line:#1c2230; --line2:#2a3340;
    --text:#e8eaed; --muted:#888780; --faint:#5b6472;
    --good:#1d9e75; --good2:#5dcaa5; --blue:#85b7eb; --red:#e24b4a; --amber:#efc84a;
    --radius:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Space Mono',ui-monospace,monospace;
       font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;
       background-image:radial-gradient(1200px 600px at 70% -10%, #0e131b 0%, #0a0c10 60%);min-height:100vh}
  .wrap{max-width:1120px;margin:0 auto;padding:22px 20px 60px}
  .cap{font-size:9px;color:var(--faint);letter-spacing:1.4px;text-transform:uppercase}
  a{color:var(--blue)}
  button{font-family:inherit}

  /* header */
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;
         background:linear-gradient(180deg,#0e131b,#0b0e13);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:14px}
  .brand{display:flex;align-items:center;gap:11px}
  #dot{width:9px;height:9px;border-radius:50%;background:var(--faint);transition:all .3s;box-shadow:0 0 0 0 transparent}
  #dot.live{background:var(--amber);animation:pulse 1.1s infinite}
  #dot.done{background:var(--good)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 #efc84a66}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .brand b{font-weight:700;letter-spacing:.5px;font-size:14px}
  .hdr-right{display:flex;align-items:center;gap:12px}
  #statusTxt{font-size:11px;color:var(--faint)}
  .btn{border:1px solid var(--line2);background:var(--panel2);color:var(--muted);border-radius:9px;
       padding:8px 13px;font-size:12px;cursor:pointer;letter-spacing:.4px;transition:.15s}
  .btn:hover{border-color:var(--blue);color:var(--text);transform:translateY(-1px)}
  .btn.run{border-color:#1a3a2c;background:#0d1512;color:var(--good2)}
  .btn.run:hover{border-color:var(--good2);box-shadow:0 0 14px #1d9e7522}
  .btn.deploy{border-color:#3a2a1a;background:#15110d;color:var(--amber)}
  .btn.deploy:hover{border-color:var(--amber)}
  .btn.ghost{padding:8px 11px}

  /* stat bar */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);
         border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .stat{background:var(--bg);padding:13px 16px}
  .stat .n{font-size:23px;margin-top:3px;font-weight:700}
  .stat.framed .n{color:var(--text)} .stat.walked .n{color:var(--blue)}
  .stat.broken .n{color:var(--red)} .stat.prog .n{color:var(--amber)}
  .stat .n small{font-size:12px;color:var(--faint);font-weight:400}
  #progBar{height:3px;background:var(--panel2);border-radius:2px;overflow:hidden;margin:10px 0 16px}
  #progFill{height:100%;width:0;background:linear-gradient(90deg,#efc84a,#5dcaa5);transition:width .5s}

  /* two-col board */
  .board{display:grid;grid-template-columns:1.05fr 1fr;gap:14px;margin-bottom:14px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px}
  .panel h3{margin:0 0 11px;font-size:9px;color:var(--faint);letter-spacing:1.4px;text-transform:uppercase;font-weight:700;display:flex;justify-content:space-between;align-items:center}
  #feed{height:248px;overflow-y:auto;font-size:11px;line-height:1.75}
  #feed .l{white-space:pre-wrap;word-break:break-word}
  svg text{font-family:'Space Mono',monospace}
  .node circle{transition:stroke .45s, stroke-width .45s, filter .45s;cursor:pointer}
  .node.bad circle{filter:drop-shadow(0 0 5px #e24b4a66)}
  .edge{transition:stroke .45s}

  /* bugs */
  .bug{display:flex;align-items:flex-start;gap:11px;padding:11px 13px;border-radius:10px;
       background:var(--panel2);border:1px solid var(--line);margin-bottom:7px;transition:.15s}
  .bug:hover{border-color:var(--line2)}
  .bug.active{border-color:#3a2424}
  .chip{font-size:9px;border-radius:5px;padding:2px 6px;border:1px solid;white-space:nowrap;margin-top:1px}
  .chip.p0{color:var(--red);border-color:#e24b4a55} .chip.p1{color:var(--amber);border-color:#efc84a55}
  .chip.ok{color:var(--good2);border-color:#1d9e7555} .chip.num{color:var(--faint);border-color:var(--line2)}
  .bug .body{flex:1;min-width:0}
  .bug .t{font-size:11.5px;color:var(--text);line-height:1.4}
  .bug .sub{font-size:9.5px;color:var(--faint);margin-top:3px}
  .bug .acts{display:flex;gap:5px}
  .mini{font-size:9px;padding:5px 8px;border-radius:6px;border:1px solid var(--line2);background:var(--panel);color:var(--blue);cursor:pointer;white-space:nowrap}
  .mini:hover{border-color:var(--blue)} .mini.warn{color:var(--muted)} .mini.warn:hover{border-color:var(--red);color:var(--red)}

  /* tabs */
  .tabs{display:flex;gap:6px;margin:18px 0 12px;flex-wrap:wrap}
  .tab{font-size:11px;padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;letter-spacing:.4px}
  .tab.on{border-color:var(--blue);color:var(--text);background:var(--panel2)}
  .docview{max-height:430px;overflow:auto;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
           padding:14px 16px;font-size:11.5px;white-space:pre-wrap;color:#c9ccd1;line-height:1.6}
  .docview h4{color:var(--good2);margin:14px 0 4px;font-size:12px} .docview .inv{color:var(--blue)}
  .addform{display:none;background:#0c1016;border:1px solid var(--line2);border-radius:10px;padding:14px;margin-bottom:12px}
  .addform.on{display:block}
  .addform label{display:block;font-size:9px;color:var(--faint);letter-spacing:1px;text-transform:uppercase;margin:9px 0 3px}
  .addform input,.addform textarea{width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:7px;
       color:var(--text);font-family:inherit;font-size:12px;padding:8px 10px}
  .addform textarea{min-height:60px;resize:vertical}
  .row{display:flex;gap:8px;align-items:center;margin-top:11px}

  /* modal + toast */
  .scrim{display:none;position:fixed;inset:0;background:#000a;backdrop-filter:blur(2px);z-index:50;align-items:center;justify-content:center}
  .scrim.on{display:flex}
  .modal{background:#0d1117;border:1px solid var(--line2);border-radius:var(--radius);max-width:600px;width:92%;padding:20px}
  .modal h2{margin:0 0 8px;font-size:14px;color:var(--text)}
  .modal p{font-size:12px;color:var(--muted)}
  .modal pre{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:12px;font-size:11px;
       color:var(--good2);white-space:pre-wrap;word-break:break-word;max-height:240px;overflow:auto}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
       background:#0d1117;border:1px solid var(--line2);border-radius:10px;padding:11px 18px;font-size:12px;
       z-index:60;transition:.25s;pointer-events:none;max-width:80%}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.ok{border-color:#1d9e7566;color:var(--good2)} #toast.err{border-color:#e24b4a66;color:var(--red)}
  .empty{font-size:10.5px;color:var(--faint);padding:10px 4px}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand"><div id="dot"></div><b>slyght · mission control</b></div>
    <div class="hdr-right">
      <span id="statusTxt">idle</span>
      <button class="btn run" onclick="runWalk()" id="runBtn">▶ run walk</button>
      <button class="btn deploy" onclick="openDeploy()">⇧ deploy</button>
    </div>
  </header>

  <div class="stats">
    <div class="stat framed"><div class="cap">framed</div><div class="n" id="mFramed">—</div></div>
    <div class="stat walked"><div class="cap">walked</div><div class="n" id="mWalked">—</div></div>
    <div class="stat broken"><div class="cap">broken</div><div class="n" id="mBroken">—</div></div>
    <div class="stat prog"><div class="cap">progress</div><div class="n"><span id="mProg">—</span><small>%</small></div></div>
  </div>
  <div id="progBar"><div id="progFill"></div></div>

  <div class="board">
    <div class="panel">
      <h3>screen map <span class="cap" id="mapHint">cash = hub · ✓ clean · ✗ broken · ⊘ not walked</span></h3>
      <svg id="map" width="100%" viewBox="0 0 340 270"></svg>
    </div>
    <div class="panel">
      <h3>walk feed <span class="cap" id="feedSrc"></span></h3>
      <div id="feed"><div class="l empty">// loading latest walk…</div></div>
    </div>
  </div>

  <div class="panel">
    <h3>open bugs · organise + compose <span id="bugCount" class="cap"></span></h3>
    <div id="bugList"><div class="empty">// loading OPEN-BUGS.md…</div></div>
    <div class="row"><button class="mini" onclick="toggleAddBug()">+ add bug</button>
      <button class="mini warn" onclick="showResolved=!showResolved;renderBugs()" id="resBtn">show resolved</button></div>
    <div class="addform" id="addBugForm">
      <label>number</label><input id="abNum" placeholder="e.g. 52">
      <label>title</label><input id="abTitle" placeholder="short description">
      <label>bug detail</label><textarea id="abBug" placeholder="what's broken + repro"></textarea>
      <label>status</label><input id="abStatus" value="open">
      <div class="row"><button class="btn" onclick="submitAddBug()">append to OPEN-BUGS.md</button></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab on" data-doc="featuremap" onclick="openDoc('featuremap',this)">feature map</div>
    <div class="tab" data-doc="invariants" onclick="openDoc('invariants',this)">invariants</div>
    <div class="tab" data-doc="rules" onclick="openDoc('rules',this)">rules</div>
    <div class="tab" data-doc="walkspecs" onclick="openDoc('walkspecs',this)">walk specs</div>
    <div class="tab" data-doc="coverage" onclick="openDoc('coverage',this)">coverage map</div>
  </div>
  <div id="docPanel"></div>

</div>

<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>
<div id="toast"></div>

<script>
const TOKEN = "__MC_TOKEN__";                 // injected by server.js at serve time
// curated main-surface ring + which walk flow(s) feed each node
const SURFACES = [
  {id:'bills',    label:'bills',    flows:['bills-mark-paid']},
  {id:'save',     label:'savings',  flows:['darwin-A-quicklog','darwin-B-plantick']},
  {id:'plan',     label:'plan',     flows:['plan-lock']},
  {id:'debts',    label:'debts',    flows:[]},
  {id:'analysis', label:'analysis', flows:[]},
  {id:'ai',       label:'AI chat',  flows:['ai-provenance']},
  {id:'dash',     label:'dash',     flows:['log-transaction']},
];
const FRAMED = 202;                           // campaign frame (coverage-map: 7 surfaces · 202 actions)
let WALK=null, BUGS=[], showResolved=false, docBuf={};

const $=id=>document.getElementById(id);
function toast(msg,kind){const t=$('toast');t.textContent=msg;t.className='on '+(kind||'');setTimeout(()=>t.className=kind||'',2600);}
async function api(path){const r=await fetch(path);return r.json();}
async function action(name,args){
  const r=await fetch('/api/action',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,args:args||{},token:TOKEN})});
  const j=await r.json(); if(!r.ok||j.ok===false){toast((j.error||j.reason||'failed'),'err');throw new Error(j.error||j.reason);} return j;
}

// ── derive a flow's verdict from the walk DATA (not hardcoded) ──────────────
function flowVerdict(f){
  if(!f) return 'pending';
  const steps=f.steps||[]; const lands=s=>(s.lands||[]).map(l=>l.type);
  if(steps.some(s=>s.error)) return 'bad';
  const isSave=/sav|bucket|darwin-A/i.test(f.flow+f.title);
  const submit=steps.find(s=>/submit/i.test(s.id||''));
  if(isSave&&submit){const l=lands(submit);if(l.includes('balance_apply_delta')&&!l.includes('bucket_saved_change'))return 'bad';}
  const undo=steps.find(s=>/undo/i.test(s.id||''));
  if(undo&&(undo.lands||[]).length===0) return 'bad';
  const pr=(steps.find(s=>s.probe)||{}).probe;
  if(pr&&(pr.rainy_lookup_byPromptId===false||(typeof pr.getGenuineSurplus==='number'&&pr.getGenuineSurplus!==pr.getDynamicDailyBudget))) return 'bad';
  return 'good';
}
function surfaceVerdict(s){
  const fs=(WALK&&WALK.flows||[]).filter(f=>s.flows.includes(f.flow));
  if(!fs.length) return 'pending';
  const vs=fs.map(flowVerdict); return vs.includes('bad')?'bad':vs.includes('good')?'good':'pending';
}

// ── screen map (radial, generated) ──────────────────────────────────────────
function drawMap(){
  const cx=170,cy=130,R=92, col={bad:'#e24b4a',good:'#1d9e75',pending:'#888780',walking:'#efc84a'};
  let edges='',nodes='';
  SURFACES.forEach((s,i)=>{
    const a=(-90 + i*(360/SURFACES.length))*Math.PI/180, x=cx+R*Math.cos(a), y=cy+R*Math.sin(a);
    s._x=x;s._y=y; const v=s._v||surfaceVerdict(s); const c=col[v]||col.pending;
    edges+=`<line class="edge" id="e-${s.id}" x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="${c}" stroke-width="1.5" ${v==='bad'?'stroke-dasharray="5 4"':''}/>`;
    nodes+=`<g class="node ${v}" id="n-${s.id}"><circle cx="${x}" cy="${y}" r="19" fill="#11161e" stroke="${c}" stroke-width="${v==='bad'?2.5:1.8}"/>`
         +`<text x="${x}" y="${y+3}" text-anchor="middle" fill="#aab0b8" style="font-size:8px">${s.label}</text></g>`;
  });
  $('map').innerHTML=edges+nodes
    +`<g><circle cx="${cx}" cy="${cy}" r="25" fill="#0d1512" stroke="#5dcaa5" stroke-width="1.8"/>`
    +`<text x="${cx}" y="${cy-1}" text-anchor="middle" fill="#e8eaed" style="font-size:9px">cash</text>`
    +`<text x="${cx}" y="${cy+10}" text-anchor="middle" fill="#5dcaa5" style="font-size:7.5px">hub</text></g>`;
}
function setNode(id,v){const s=SURFACES.find(x=>x.id===id);if(s){s._v=v;drawMap();}}

// ── feed ────────────────────────────────────────────────────────────────────
function feedLine(txt,color){const f=$('feed');const d=document.createElement('div');d.className='l';d.style.color=color||'#888780';d.textContent=txt;f.appendChild(d);f.scrollTop=f.scrollHeight;}
function renderFeedFromWalk(){
  const f=$('feed');f.innerHTML='';
  if(!WALK){f.innerHTML='<div class="l empty">// no walk.json found — run a walk</div>';return;}
  $('feedSrc').textContent=(WALK.dir||'')+' · '+(WALK.flows||[]).length+' flows';
  (WALK.flows||[]).forEach(fl=>{
    const v=flowVerdict(fl); const c=v==='bad'?'#e24b4a':v==='good'?'#5dcaa5':'#5b6472';
    feedLine((v==='bad'?'✗ ':v==='good'?'✓ ':'⊘ ')+fl.flow,c);
    (fl.steps||[]).forEach(s=>{
      const l=(s.lands||[]).map(x=>x.type).join(',');
      feedLine('   '+String(s.n).padStart(2)+' '+s.id+(l?'  ['+l+']':'')+(s.error?'  ERR '+s.error:''),'#6f7681');
    });
  });
  if((WALK.pageErrors||[]).length) feedLine('// '+WALK.pageErrors.length+' pageErrors (boot TDZ — see coverage map)','#7a6f4a');
}

// ── stat bar ─────────────────────────────────────────────────────────────────
function renderStats(){
  const flows=(WALK&&WALK.flows)||[];
  const walked=flows.reduce((n,f)=>n+(f.steps||[]).length,0);
  const broken=flows.filter(f=>flowVerdict(f)==='bad').length;
  $('mFramed').textContent=FRAMED; $('mWalked').textContent=walked; $('mBroken').textContent=broken;
  const pct=Math.round(walked/FRAMED*100); $('mProg').textContent=pct; $('progFill').style.width=Math.min(pct,100)+'%';
}

// ── bugs (parse OPEN-BUGS.md, preserve everything; just read) ────────────────
const ACTIVE=/^(open|investigating)/i;
function inferSev(title,body){return /silent|loss|stuck|wrong number|poison|negativ|double|overdraw|unrecover/i.test(title+body)?0:1;}
function parseBugs(md){
  const out=[]; const re=/^##\s+(\d+)\.\s+(.*)$/gm; let m,idx=[];
  while((m=re.exec(md))){idx.push({num:+m[1],title:m[2].trim(),at:m.index});}
  idx.forEach((b,i)=>{const seg=md.slice(b.at,(idx[i+1]||{at:md.length}).at);
    const st=(seg.match(/^- \*\*Status:\*\*\s*(.*)$/m)||[])[1]||'open';
    const bug=(seg.match(/^- \*\*Bug:\*\*\s*([\s\S]*?)(?=\n- \*\*|\n##|$)/m)||[])[1]||'';
    out.push({num:b.num,title:b.title,status:st.trim(),detail:bug.replace(/\s+/g,' ').trim().slice(0,180),sev:inferSev(b.title,bug)});});
  return out;
}
function renderBugs(){
  const list=BUGS.filter(b=>showResolved||ACTIVE.test(b.status));
  list.sort((a,b)=>(ACTIVE.test(b.status)-ACTIVE.test(a.status))||(a.sev-b.sev)||(a.num-b.num));
  $('bugCount').textContent=BUGS.filter(b=>ACTIVE.test(b.status)).length+' active · '+BUGS.length+' total';
  $('resBtn').textContent=showResolved?'hide resolved':'show resolved';
  if(!list.length){$('bugList').innerHTML='<div class="empty">// none</div>';return;}
  $('bugList').innerHTML=list.map(b=>{
    const act=ACTIVE.test(b.status); const chip=act?(b.sev===0?'p0':'p1'):'ok';
    return `<div class="bug ${act?'active':''}">
      <span class="chip num">#${b.num}</span>
      <span class="chip ${chip}">${act?(b.sev===0?'P0':'P1'):'done'}</span>
      <div class="body"><div class="t">${esc(b.title)}</div><div class="sub">${esc(b.status)}${b.detail?' · '+esc(b.detail):''}</div></div>
      <div class="acts">
        <button class="mini" onclick="compose(${b.num})">compose ↗</button>
        ${act?`<button class="mini warn" onclick="dismiss(${b.num})">dismiss</button>`:''}
      </div></div>`;}).join('');
}
const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// ── compose → brief to disk + kickoff prompt ─────────────────────────────────
async function compose(num){
  const b=BUGS.find(x=>x.num===num); if(!b)return;
  const sev=b.sev===0?'P0':'P1';
  const content=`# Fix: ${b.title}

**Bug #${b.num}** · **Severity:** ${sev} · **Status:** ${b.status}

**Finding:** ${b.detail||b.title}
**Root cause (if known):** _fill in from the walk / coverage map_
**The fix:** _scope through investigation first_

Run through the full 6-tier pipeline. Conservation + Guardian green gate.
§8 plain-English at commit. My approval before push.
`;
  const slug=b.title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,50)||('bug-'+b.num);
  try{
    const r=await action('writeBrief',{slug,content});
    const kickoff=`Read ${r.path} and run it through the full pipeline — my approval before push.`;
    modal(`<h2>brief written → ${esc(r.path)}</h2>
      <p>Paste this one-liner into Claude Code to start the mission:</p>
      <pre id="kick">${esc(kickoff)}</pre>
      <div class="row"><button class="btn" onclick="navigator.clipboard.writeText(document.getElementById('kick').textContent);toast('copied','ok')">copy kickoff</button>
      <button class="btn ghost" onclick="closeModal()">close</button></div>`);
    toast('brief saved','ok');
  }catch(e){}
}
async function dismiss(num){
  if(!confirm('Mark bug #'+num+' wontfix in OPEN-BUGS.md? (surgical — only the Status line changes)'))return;
  try{await action('setBugStatus',{bugNum:num,status:'wontfix (dismissed from cockpit)'});toast('bug #'+num+' dismissed','ok');await loadBugs();}catch(e){}
}

// ── add bug (append a new section — prose preserved) ─────────────────────────
function toggleAddBug(){$('addBugForm').classList.toggle('on');}
async function submitAddBug(){
  const num=$('abNum').value.trim(),title=$('abTitle').value.trim();
  if(!num||!title){toast('number + title required','err');return;}
  const block=`## ${num}. ${title}\n- **Bug:** ${$('abBug').value.trim()||'(detail TBD)'}\n- **Source:** mission-control cockpit ${new Date().toISOString().slice(0,10)}\n- **Status:** ${$('abStatus').value.trim()||'open'}`;
  try{await action('addBug',{block});toast('appended bug #'+num,'ok');$('addBugForm').classList.remove('on');$('abNum').value=$('abTitle').value=$('abBug').value='';await loadBugs();}catch(e){}
}

// ── doc panels (view + simple append-entry form) ─────────────────────────────
const ADDERS={
  featuremap:{action:'editFeatureMap',fields:[['name','surface / feature name'],['path','BRAIN → X → Y'],['type','screen/action/writer/reader'],['lives','index.html:LXXXX-LXXXX'],['notes','notes']],
    build:v=>`\n### ${v.name}\n**Path:** \`${v.path}\`\n**Type:** ${v.type}\n**Lives in:** \`${v.lives}\`\n**Notes:** ${v.notes}\n**Last touched:** mission-control ${today()}\n`},
  invariants:{action:'editInvariants',fields:[['id','INV-NN'],['statement','the rule, plain language'],['why','why it matters'],['violated','the symptom you would see'],['test','how a spec checks it']],
    build:v=>`\n**${v.id}: ${v.statement}**\n- Why: ${v.why}\n- Violated when: ${v.violated}\n- Test: ${v.test}\n`},
  rules:{action:'editRules',fields:[['title','rule title'],['rule','the rule / directive']],
    build:v=>`\n## ${v.title}\n${v.rule}\n`},
};
async function openDoc(key,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on')); if(el)el.classList.add('on');
  const r= key==='walkspecs' ? await api('/api/walkspecs') : await api('/api/read?name='+key);
  if(key==='walkspecs'){
    const specs=r.specs||[];
    $('docPanel').innerHTML=`<div class="empty">${specs.length} walk-specs · click to view + edit</div>`
      +`<div class="tabs">`+specs.map(s=>`<div class="tab" onclick="openWalkSpec('${esc(s)}',this)">${esc(s.replace('.md',''))}</div>`).join('')+`</div><div id="wsView"></div>`;
    return;
  }
  docBuf[key]=r.content||''; const add=ADDERS[key];
  $('docPanel').innerHTML=
    (add?`<button class="mini" onclick="$('af-${key}').classList.toggle('on')">+ add entry</button>
      <div class="addform" id="af-${key}">${add.fields.map(f=>`<label>${f[1]}</label><input id="fi-${key}-${f[0]}">`).join('')}
      <div class="row"><button class="btn" onclick="appendDoc('${key}')">append + save</button>
      <span class="cap">appends to the real file · existing content preserved</span></div></div>`:'')
    +`<div class="docview">${renderMd(r.content||'(empty)')}</div>`;
}
async function openWalkSpec(name,el){
  const r=await api('/api/walkspec?name='+encodeURIComponent(name));
  $('wsView').innerHTML=`<div class="docview">${renderMd(r.content||'')}</div>`;
}
async function appendDoc(key){
  const add=ADDERS[key]; const v={}; add.fields.forEach(f=>v[f[0]]=($('fi-'+key+'-'+f[0]).value||'').trim());
  const updated=docBuf[key].replace(/\s*$/,'\n')+add.build(v);
  try{await action(add.action,{content:updated});toast('saved → '+key,'ok');openDoc(key,document.querySelector('.tab[data-doc='+key+']'));}catch(e){}
}
const today=()=>new Date().toISOString().slice(0,10);
function renderMd(md){return esc(md)
  .replace(/^### (.*)$/gm,'<h4>$1</h4>').replace(/^## (.*)$/gm,'<h4>$1</h4>')
  .replace(/\*\*(INV-\d+[^*]*)\*\*/g,'<span class="inv">$1</span>').replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')
  .replace(/`([^`]+)`/g,'<span style="color:#5dcaa5">$1</span>');}

// ── run walk (stream) ────────────────────────────────────────────────────────
let polling=null;
async function runWalk(){
  try{const r=await action('runWalk',{}); if(!r.started){toast(r.reason||'busy','err');return;}}catch(e){return;}
  $('dot').className='live';$('statusTxt').textContent='walking · live';$('runBtn').style.opacity='.5';
  $('feed').innerHTML='';feedLine('// walk started','#5dcaa5');
  SURFACES.forEach(s=>{s._v='pending';});drawMap();
  let seen=0;
  polling=setInterval(async()=>{
    const j=await api('/api/walklog'); const lines=j.lines||[];
    for(;seen<lines.length;seen++){
      const ln=lines[seen];
      if(ln.startsWith('@@FLOW_START')){const id=mapFlow(ln.split(' ')[1]);if(id)setNode(id,'walking');feedLine('→ '+ln.split(' ')[1],'#85b7eb');}
      else if(ln.startsWith('@@FLOW_DONE')){feedLine('  done '+ln.split(' ')[1],'#6f7681');}
      else if(ln.startsWith('@@WALK_EXIT')){/* handled below */}
      else feedLine('  '+ln,'#6f7681');
    }
    if(!j.running){clearInterval(polling);polling=null;await finishWalk();}
  },600);
}
function mapFlow(flow){const s=SURFACES.find(x=>x.flows.includes(flow));return s&&s.id;}
async function finishWalk(){
  WALK=await reloadWalk(); renderStats(); drawMap(); renderFeedFromWalk();
  const broken=(WALK.flows||[]).filter(f=>flowVerdict(f)==='bad').length;
  $('dot').className='done';$('statusTxt').textContent='walk complete · '+broken+' broken';$('runBtn').style.opacity='1';
  toast('walk complete · '+broken+' broken', broken?'err':'ok');
}

// ── deploy (confirm gate — never auto-fires) ────────────────────────────────
function openDeploy(){
  modal(`<h2>⇧ deploy — ship to main?</h2>
    <p>This runs <b>git push</b> on the slyght repo. It is the one irreversible action. Type <b>ship</b> to confirm.</p>
    <input id="depConf" placeholder="type: ship" style="width:100%;background:#0a0c10;border:1px solid #2a3340;border-radius:7px;color:#e8eaed;font-family:inherit;padding:9px 11px;margin:10px 0">
    <div class="row"><button class="btn deploy" onclick="doDeploy()">confirm deploy</button>
    <button class="btn ghost" onclick="closeModal()">cancel</button></div>
    <p class="cap" style="margin-top:10px">server also requires confirm:true — both gates must agree</p>`);
}
async function doDeploy(){
  if(($('depConf').value||'').trim()!=='ship'){toast('type "ship" to confirm','err');return;}
  try{const r=await action('deploy',{confirm:true});closeModal();
    modal(`<h2>${r.ok?'✓ pushed':'✗ push failed'}</h2><pre>${esc(r.output||r.reason||'')}</pre><div class="row"><button class="btn ghost" onclick="closeModal()">close</button></div>`);
  }catch(e){}
}

// ── modal/util ───────────────────────────────────────────────────────────────
function modal(html){$('modal').innerHTML=html;$('scrim').classList.add('on');}
function closeModal(){$('scrim').classList.remove('on');}
$('scrim').addEventListener('click',e=>{if(e.target===$('scrim'))closeModal();});

// ── boot ─────────────────────────────────────────────────────────────────────
async function reloadWalk(){const j=await api('/api/walk-latest');return j.walk?Object.assign(j.walk,{dir:j.dir}):null;}
async function loadBugs(){const j=await api('/api/read?name=openbugs');BUGS=parseBugs(j.content||'');renderBugs();}
(async function boot(){
  WALK=await reloadWalk(); renderStats(); drawMap(); renderFeedFromWalk();
  await loadBugs();
  openDoc('featuremap',document.querySelector('.tab[data-doc=featuremap]'));
})();
</script>
