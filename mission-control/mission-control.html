<!DOCTYPE html>
<!-- Jarvis — slyght mission control. Ticketing platform + CC intermediary.
     Shell only: the server injects the write-token; jarvis.css + jarvis.js carry
     the ServiceNow/Jira skin + the app. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jarvis · slyght mission control</title>
<link rel="stylesheet" href="/jarvis.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span id="navBack"></span>
      <div class="logo">J</div>
      <span class="brand-name">Jarvis</span>
      <small>· slyght mission control</small>
    </div>
    <div class="right">
      <button class="cp-hint" onclick="openPalette()" aria-label="Open command palette (Ctrl-K)" title="Search & jump (Ctrl-K)">
        <span class="cp-hint-ic">⌕</span><kbd>⌘K</kbd>
      </button>
      <div id="sysStatus" class="sysstrip">
        <span class="sys-live"><span class="sys-dot"></span> Live · localhost</span>
      </div>
    </div>
  </header>
  <div class="layout">
    <nav class="rail">
      <div class="sect">Work</div>
      <a href="#/overview" data-r="overview" title="Flightdeck"><span class="ic">◎</span> Flightdeck</a>
      <a href="#/board"    data-r="board" title="Board"><span class="ic">▦</span> Board</a>
      <a href="#/planning" data-r="planning" title="Releases"><span class="ic">◈</span> Releases</a>
      <a href="#/deploy"   data-r="deploy" title="Deploy"><span class="ic">⬆</span> Deploy</a>

      <div class="sect">See</div>
      <a href="#/map"      data-r="map" title="App Map"><span class="ic">◇</span> App Map</a>
      <a href="#/insights" data-r="insights" title="Insights"><span class="ic">◑</span> Insights</a>
      <a href="#/architecture" data-r="architecture" title="Architecture"><span class="ic">⌂</span> Architecture</a>

      <div class="sect">Jarvis</div>
      <a href="#/briefing" data-r="briefing" title="Briefing"><span class="ic">✦</span> Briefing</a>
      <a href="#/command"  data-r="command" title="Command Centre"><span class="ic">⌁</span> Command Centre</a>

      <div class="sect">Reference</div>
      <a href="#/knowledge"       data-r="knowledge" title="Knowledge"><span class="ic">📖</span> Knowledge</a>
      <a href="#/command/prompts" data-r="command" title="Prompts"><span class="ic">⌨</span> Prompts</a>
    </nav>
    <main><div id="nowBar"></div><div id="view" class="view"></div></main>
  </div>

  <div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>
  <div id="toast"></div>

  <script>window.MC_TOKEN = "__MC_TOKEN__";</script>
  <script src="/jarvis.js"></script>
</body>
</html>
